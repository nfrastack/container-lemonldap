location ~ ^(?<sc>/.*\.psgi)(?:$|/) {
    {{fastcgi_params}};
    fastcgi_pass {{PORTAL_SOCKET}};
    fastcgi_param LLTYPE psgi;
    fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    fastcgi_split_path_info ^(.*\.psgi)(/.*)$;
    fastcgi_param PATH_INFO  $fastcgi_path_info;
    fastcgi_param UNIQUE_ID $request_id;

    ### REST functions for sessions management (disabled by default - use PORTAL_ENABLE_REST)
    location ~ ^/index.psgi/adminSessions {
        fastcgi_pass {{PORTAL_SOCKET}};
        deny all;
    }

    location ~ ^/index.psgi/proxy {
        fastcgi_pass {{PORTAL_SOCKET}};
        deny all;
    }

    location ~ ^/index.psgi/sessions {
        fastcgi_pass {{PORTAL_SOCKET}};
        deny all;
    }

    location ~ ^/index.psgi/config {
        fastcgi_pass {{PORTAL_SOCKET}};
        deny all;
    }

    location ~ ^/index.psgi/notification {
        fastcgi_pass {{PORTAL_SOCKET}};
        deny all;
    }
    ### End REST
}

location = /status {
    deny all;
}

index index.psgi;

location / {
    try_files $uri $uri/ =404;
}

location /static/ {
    expires 30d;
    alias {{PORTAL_STATIC_PATH}}/;
}
