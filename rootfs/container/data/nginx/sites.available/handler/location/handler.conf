location = /reload {
    allow 127.0.0.0/8;
    allow ::1/128;
    deny all;
    {{fastcgi_params}};
    fastcgi_pass {{HANDLER_SOCKET}};
    fastcgi_param LLTYPE reload;
}

location / { # Client requests
    deny all;
}

location = /status {
    allow 127.0.0.0/8;
    allow ::1/128;
    deny all;
    {{fastcgi_params}};
    fastcgi_pass {{HANDLER_SOCKET}};
    fastcgi_param LLTYPE status;
}
